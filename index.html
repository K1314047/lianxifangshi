<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式验证</title>
    <!-- 引入Font Awesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .verification-section {
            margin-bottom: 30px;
        }
        
        .code-display {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 8px;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            user-select: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        input:focus {
            border-color: #6a11cb;
            outline: none;
            box-shadow: 0 0 0 3px rgba(106, 17, 203, 0.1);
        }
        
        button {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .refresh-btn {
            background: #f8f9fa;
            color: #6a11cb;
            border: 2px solid #6a11cb;
            padding: 10px 15px;
        }
        
        .refresh-btn:hover {
            background: #6a11cb;
            color: white;
        }
        
        .contact-info {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            display: none;
            animation: fadeIn 0.5s ease;
            border-left: 5px solid #6a11cb;
        }
        
        .contact-info h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: all 0.3s;
        }
        
        .contact-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .contact-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: white;
            font-size: 18px;
        }
        
        .contact-text {
            text-align: left;
        }
        
        .contact-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 3px;
        }
        
        .contact-value {
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        
        .contact-link {
            color: inherit;
            text-decoration: none;
            display: block;
            padding: 5px 0;
            transition: color 0.3s;
        }
        
        .contact-link:hover {
            color: #6a11cb;
        }
        
        .message {
            margin-top: 10px;
            padding: 10px;
            border-radius: 5px;
            font-weight: 500;
            display: none;
        }
        
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake {
            animation: shake 0.5s;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            .input-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>联系方式验证</h1>
        <p class="description">请输入下方显示的验证码以查看联系方式</p>
        
        <div class="verification-section">
            <div class="code-display" id="codeDisplay">1234</div>
            
            <div class="input-group">
                <input type="text" id="codeInput" placeholder="请输入验证码" maxlength="4">
                <button class="refresh-btn" id="refreshBtn">刷新</button>
            </div>
            
            <button id="submitBtn">验证并查看联系方式</button>
            
            <div class="message" id="message"></div>
        </div>
        
        <div class="contact-info" id="contactInfo">
            <h2>联系方式</h2>
            
            <div class="contact-item">
                <div class="contact-icon">
                    <i class="fab fa-telegram-plane"></i>
                </div>
                <div class="contact-text">
                    <div class="contact-label">Telegram</div>
                    <div class="contact-value">
                        <a href="https://t.me/ayig61" target="_blank" class="contact-link">
                            @ayig61
                        </a>
                    </div>
                </div>
            </div>
            
            <div class="contact-item">
                <div class="contact-icon">
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-text">
                    <div class="contact-label">Email</div>
                    <div class="contact-value">
                        <a href="mailto:1314047@gmail.com" class="contact-link">
                            1314047@gmail.com
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const codeDisplay = document.getElementById('codeDisplay');
            const codeInput = document.getElementById('codeInput');
            const submitBtn = document.getElementById('submitBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const contactInfo = document.getElementById('contactInfo');
            const message = document.getElementById('message');
            
            // 生成随机验证码
            function generateCode() {
                const chars = '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
                let code = '';
                for (let i = 0; i < 4; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return code;
            }
            
            // 更新验证码显示
            function updateCode() {
                const newCode = generateCode();
                codeDisplay.textContent = newCode;
                codeInput.value = '';
                message.style.display = 'none';
            }
            
            // 初始化验证码
            updateCode();
            
            // 刷新验证码
            refreshBtn.addEventListener('click', updateCode);
            
            // 提交验证
            submitBtn.addEventListener('click', function() {
                const enteredCode = codeInput.value.toUpperCase();
                const currentCode = codeDisplay.textContent;
                
                if (enteredCode === currentCode) {
                    // 验证成功
                    contactInfo.style.display = 'block';
                    message.textContent = '验证成功！以下是联系方式：';
                    message.className = 'message success';
                    message.style.display = 'block';
                    
                    // 清空输入框
                    codeInput.value = '';
                    
                    // 生成新验证码
                    updateCode();
                } else {
                    // 验证失败
                    message.textContent = '验证码错误，请重新输入！';
                    message.className = 'message error';
                    message.style.display = 'block';
                    
                    // 添加抖动效果
                    codeInput.classList.add('shake');
                    setTimeout(() => {
                        codeInput.classList.remove('shake');
                    }, 500);
                    
                    // 清空输入框并聚焦
                    codeInput.value = '';
                    codeInput.focus();
                }
            });
            
            // 按Enter键提交
            codeInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitBtn.click();
                }
            });
        });
    </script>
</body>
</html>
